name: Bug report
description: Report reproducible behavior in the KeyVeil reference implementation.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Use synthetic data only. Do not include credentials, real payment data, or vulnerability details.
  - type: input
    id: commit
    attributes:
      label: Commit
      placeholder: Full commit SHA
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal synthetic reproduction
    validations:
      required: true
